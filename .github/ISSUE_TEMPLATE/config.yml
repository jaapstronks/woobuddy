    url: https://github.com/jaapstronks/woobuddy/discussions
    about: Open een discussie voor open vragen, ideeën of beslissingen waar je nog niet zeker van bent.
  - name: Beveiligingsmelding
    url: https://github.com/jaapstronks/woobuddy/security/advisories/new
    about: Meld een beveiligingsprobleem privé via GitHub. NIET als publiek issue openen.
