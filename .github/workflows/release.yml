name: Release

# Triggered by pushing a tag that matches `v*` (e.g. `v0.1.0`, `v0.2.0-rc1`).
# Builds and pushes the API + frontend images to GHCR at the tag version,
# then publishes a GitHub Release with an auto-generated changelog from
# the merged PR titles since the previous tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build & push ${{ matrix.image }} image
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: woobuddy-api
            context: ./backend
          - image: woobuddy-frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v6

      # QEMU registers binfmt handlers so the amd64 GitHub-hosted runner can
      # also build the arm64 image. Without this the linux/arm64 leg of the
      # platforms matrix below fails with "exec format error".
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces both `:vX.Y.Z` (the tag itself) and `:latest` for stable
      # releases. Pre-release tags (e.g. `v0.2.0-rc1`) only get the version
      # tag, never `:latest`.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # linux/arm64 covers Apple Silicon dev laptops and arm64 cloud
          # instances (Hetzner CAX, AWS Graviton, etc.) that increasingly
          # dominate the self-host audience. The arm64 leg builds under QEMU
          # emulation on the amd64 runner, ~2x slower but still under 5 min.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: images

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # `generate_release_notes` uses GitHub's built-in PR-title changelog
      # (categorized via .github/release.yml if present). All merges to
      # main are squash-and-merge with Conventional Commit titles, so the
      # generated notes read cleanly without further processing.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
