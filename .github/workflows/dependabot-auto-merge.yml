name: Dependabot auto-merge

# Auto-merge Dependabot PRs that only bump patch or minor versions, once CI is
# green. Majors stay open for human review — the default path must not silently
# take a breaking upgrade. For grouped PRs, fetch-metadata reports the highest
# update-type in the group, so a group containing any major will *not* be
# auto-merged.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # v3 verifies the HEAD commit's GPG signature by default. That check
          # fails on any Dependabot branch a human has rebased locally (the
          # rebase rewrites the committer, stripping Dependabot's signature).
          # The `if:` guard above already restricts this workflow to PRs
          # *opened* by Dependabot, so skipping the signature check here only
          # widens the legitimate cases — human-fixed Dependabot branches
          # still auto-merge once CI is green.
          skip-commit-verification: true

      - name: Enable auto-merge for patch and minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
