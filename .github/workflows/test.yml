name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — Vitest unit tests + type checking
  # ---------------------------------------------------------------------------
  frontend-unit:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    # PUBLIC_API_URL is imported via `$env/static/public`, which requires
    # the variable to be present at build/check time. Real values come
    # from `frontend/.env` locally (git-ignored); in CI we pass a
    # placeholder so svelte-check can resolve the import.
    env:
      PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx svelte-kit sync
      - run: npm run check
      - run: npm run test

  # ---------------------------------------------------------------------------
  # Backend — pytest with PostgreSQL service container
  # ---------------------------------------------------------------------------
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: woobuddy
          POSTGRES_PASSWORD: woobuddy
          POSTGRES_DB: woobuddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U woobuddy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://woobuddy:woobuddy@localhost:5432/woobuddy_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"
      - run: ruff check app/
      - run: pytest tests/ -v --tb=short
