version: 2
updates:
  # ---------------------------------------------------------------------------
  # Python backend
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      # Group non-breaking updates so we get one PR, not twenty.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # ---------------------------------------------------------------------------
  # SvelteKit frontend
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # ---------------------------------------------------------------------------
  # GitHub Actions (workflow files)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"

  # ---------------------------------------------------------------------------
  # Docker base images
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
