services:
  # ---------------------------------------------------------------------------
  # Frontend — SvelteKit on Node 22
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src

  # ---------------------------------------------------------------------------
  # API — FastAPI on Python 3.12
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://woobuddy:woobuddy@postgres:5432/woobuddy
      - MINIO_ENDPOINT=minio:9000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: woobuddy
      POSTGRES_PASSWORD: woobuddy
      POSTGRES_DB: woobuddy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woobuddy"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for PDFs
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: woobuddy
      MINIO_ROOT_PASSWORD: woobuddy-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO init — creates the "documents" bucket on first run
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: woobuddy
      MINIO_ROOT_PASSWORD: woobuddy-secret
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: /bin/sh
    command: /init-minio.sh
    restart: "no"

volumes:
  pgdata:
  minio_data:
